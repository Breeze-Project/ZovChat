chat:
  globalSymbol: "!"
  localChatRadius: 128

  formats:
    global: "<gray>[▸] <player>: <white><message>"
    local: "<gray>[▸] <player>: <gray><message>"
    clan: "%ccb_tag% <gray>[▸] <player>: <green><message>"

  adminChat:
    symbol: "#"
    permission: "zovchat.adminChat"
    format: "<dark_red>[▸] <player>: <red><message>"

mention:
  color: "<gold>"

messages:
  join: "<green>→ <white><player>"
  quit: "<red>← <white><player>"

database:
  name: "database.db"
  poolSize: 1
